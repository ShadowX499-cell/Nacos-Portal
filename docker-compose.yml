version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nacos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nacos_db
      POSTGRES_USER: nacos_user
      POSTGRES_PASSWORD: nacos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nacos_user -d nacos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nacos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PRODUCTION PROFILES (not used in dev) ---

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nacos_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://nacos_user:nacos_pass@postgres:5432/nacos_db
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nacos_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
